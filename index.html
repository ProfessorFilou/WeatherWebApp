<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WeatherWeb</title>
  <link rel="icon" type="image/png" href="WeatherWeb.png">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>

  <style>
    body { 
      font-family: 'Inter', system-ui, -apple-system, sans-serif; 
      transition: background 1.5s ease-in-out;
      background-attachment: fixed;
      background-size: 100% 100%;
      position: relative;
      overflow-x: hidden;
    }
    
    /* ─── Apple Mesh-Gradients ─── */
    body.theme-sunny-day { background: radial-gradient(circle at 70% 15%, #7ec2f3 0%, #3a88e9 45%, #1a5cb1 100%); }
    body.theme-sunny-night { background: radial-gradient(circle at 30% 20%, #1a2a4a 0%, #0d1627 60%, #050814 100%); }
    body.theme-cloudy-day { background: radial-gradient(circle at 50% 10%, #a2b5c6 0%, #788fa2 50%, #536677 100%); }
    body.theme-cloudy-night { background: radial-gradient(circle at 50% 10%, #2c353e 0%, #1c2228 60%, #0f1317 100%); }
    body.theme-rain-day { background: radial-gradient(circle at 40% 20%, #4b617a 0%, #304055 50%, #1b2636 100%); }
    body.theme-rain-night { background: radial-gradient(circle at 40% 20%, #182230 0%, #0f1620 60%, #070a0f 100%); }
    body.theme-snow-day { background: radial-gradient(circle at 60% 20%, #cbdce9 0%, #9cb3c9 50%, #758da5 100%); }
    body.theme-snow-night { background: radial-gradient(circle at 60% 20%, #2b3641 0%, #1a222a 60%, #0f141a 100%); }
    
    /* Globaler Vollbild-Wetterhintergrund */
    #globalWeatherCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: -1;
    }

    /* Hochwertige Apple Glas-Kacheln */
    .glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 10px 30px -10px rgb(0 0 0 / 0.15);
    }
    
    .search-bar {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .unit-toggle {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 9999px;
      position: relative;
      overflow: hidden;
      width: 96px;
      height: 40px;
    }
    
    .unit-toggle::after {
      content: '';
      position: absolute;
      top: 4px;
      left: 4px;
      width: calc(50% - 4px);
      height: calc(100% - 8px);
      background: rgba(255, 255, 255, 0.18);
      border-radius: 9999px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .unit-toggle.celsius::after  { transform: translateX(0); }
    .unit-toggle.fahrenheit::after { transform: translateX(100%); }
    
    .temp {
      font-size: clamp(5.5rem, 22vw, 9rem);
      line-height: 0.85;
      font-weight: 100;
      letter-spacing: -0.03em;
    }
    
    .map-container {
      height: 280px;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    
    /* Apple-Style Vorschlagsbox */
    #suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(35px);
      -webkit-backdrop-filter: blur(35px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      max-height: 260px;
      overflow-y: auto;
      z-index: 9999;
      display: none;
      margin-top: 8px;
      box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.3);
    }
    
    .suggestion-item {
      padding: 12px 18px;
      cursor: pointer;
      transition: all 0.2s ease;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-item:hover { background: rgba(255, 255, 255, 0.12); }

    /* Apple 10-Tage-Leiste */
    .apple-bar-bg {
      background: rgba(0, 0, 0, 0.2);
      height: 6px;
      border-radius: 9999px;
      position: relative;
    }
    .apple-bar-fill {
      position: absolute;
      height: 100%;
      border-radius: 9999px;
      background: linear-gradient(90deg, #7ad3ff, #96ffaa, #ffe066, #ff9e66);
    }
    .apple-bar-dot {
      position: absolute;
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
      top: -1px;
      box-shadow: 0 0 4px rgba(0,0,0,0.6);
    }

    .hourly-scroll {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      padding-bottom: 8px;
    }
    .hourly-scroll::-webkit-scrollbar { height: 5px; }
    .hourly-scroll::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 9999px; }
    
    .hourly-card {
      min-width: 60px;
      flex-shrink: 0;
      text-align: center;
    }
  </style>
</head>
<body class="text-white min-h-screen antialiased theme-sunny-day">

  <canvas id="globalWeatherCanvas"></canvas>

  <div class="max-w-6xl mx-auto p-4 sm:p-6 lg:p-8 relative z-10">
    
    <div class="flex flex-wrap items-center gap-4 mb-8">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-cloud-sun text-3xl text-white"></i>
        <h1 class="text-2xl font-semibold tracking-tight">WeatherWeb</h1>
      </div>
      
      <div class="flex-1 relative min-w-[240px]">
        <div class="search-bar rounded-2xl px-4 py-2.5 flex items-center gap-3">
          <i class="fa-solid fa-magnifying-glass text-white/60"></i>
          <input id="searchInput" type="text" placeholder="Suchen" class="flex-1 bg-transparent focus:outline-none text-base placeholder-white/50 text-white"/>
        </div>
        <div id="suggestions"></div>
      </div>
      
      <div class="flex items-center gap-3 ml-auto">
        <div onclick="switchUnit()" id="unitToggle" class="unit-toggle celsius flex items-center px-1 cursor-pointer">
          <div class="flex-1 text-center text-xs font-semibold z-10">°C</div>
          <div class="flex-1 text-center text-xs font-semibold z-10">°F</div>
        </div>
        
        <button onclick="getCurrentLocation()" class="bg-white/10 hover:bg-white/15 border border-white/5 px-4 py-2 rounded-2xl flex items-center gap-2 transition-all active:scale-95 text-sm font-medium">
          <i class="fa-solid fa-location-dot"></i>
          <span>Standort</span>
        </button>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      
      <div class="md:col-span-2 space-y-6">
        
        <div class="flex flex-col items-center text-center py-6">
          <h2 id="cityName" class="text-3xl sm:text-4xl font-normal tracking-wide drop-shadow-sm">Laden…</h2>
          <div id="temperature" class="temp mt-2 select-none">--</div>
          <p id="weatherDesc" class="text-lg sm:text-xl font-medium text-white/90 mt-2">Laden…</p>
          <div class="flex gap-4 text-sm font-semibold text-white/80 mt-2">
            <span>H: <span id="todayMax">--</span></span>
            <span>T: <span id="todayMin">--</span></span>
          </div>
        </div>

        <div class="glass rounded-2xl p-6 flex items-center justify-between px-8">
          <div>
            <p class="text-[11px] font-bold uppercase tracking-wider text-white/60">Gefühlt</p>
            <p id="feelsLike" class="text-3xl font-light mt-0.5">--</p>
          </div>
          <div class="text-right">
            <p class="text-[11px] font-bold uppercase tracking-wider text-white/60">Wind</p>
            <p id="windSpeed" class="text-3xl font-light mt-0.5">--</p>
          </div>
        </div>

        <div class="glass rounded-2xl p-5">
          <div class="flex items-center gap-2 text-white/60 text-xs font-bold uppercase tracking-wider mb-4 border-b border-white/10 pb-2">
            <i class="fa-regular fa-clock"></i>
            <span>Stündliche Vorhersage</span>
          </div>
          <div id="hourlyForecast" class="hourly-scroll"></div>
        </div>

        <div class="glass rounded-2xl p-4">
          <div class="text-white/60 text-xs font-bold uppercase tracking-wider mb-3 flex items-center justify-between border-b border-white/10 pb-2">
            <div class="flex items-center gap-2">
              <i class="fa-solid fa-map"></i>
              <span>Wetterkarte</span>
            </div>
            <button onclick="toggleMapTheme()" id="mapThemeBtn" class="bg-white/10 hover:bg-white/15 w-8 height-8 p-1.5 rounded-xl transition-all active:scale-90 flex items-center justify-center text-sm" title="Karten-Design ändern">
              <i id="mapThemeIcon" class="fa-solid fa-sun text-amber-400"></i>
            </button>
          </div>
          <div id="map" class="map-container"></div>
        </div>
      </div>

      <div class="space-y-6">
        
        <div class="glass rounded-2xl p-5">
          <div class="flex items-center gap-2 text-white/60 text-xs font-bold uppercase tracking-wider mb-4 border-b border-white/10 pb-2">
            <i class="fa-regular fa-calendar-days"></i>
            <span>7-Tage-Vorhersage</span>
          </div>
          <div id="dailyForecast" class="space-y-4"></div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          
          <div class="glass rounded-2xl p-4 flex flex-col justify-between h-32">
            <div>
              <div class="text-white/50 text-[11px] font-bold uppercase tracking-wider flex items-center gap-1.5">
                <i class="fa-solid fa-droplet text-[10px]"></i>Feuchtigkeit
              </div>
              <p id="humidity" class="text-3xl font-light mt-1">--</p>
            </div>
            <p id="humidityInfo" class="text-[11px] text-white/70 leading-tight">--</p>
          </div>

          <div class="glass rounded-2xl p-4 flex flex-col justify-between h-32">
            <div>
              <div class="text-white/50 text-[11px] font-bold uppercase tracking-wider flex items-center gap-1.5">
                <i class="fa-solid fa-gauge-high text-[10px]"></i>Luftdruck
              </div>
              <p id="pressure" class="text-3xl font-light mt-1">--</p>
            </div>
            <p id="pressureInfo" class="text-[11px] text-white/70 leading-tight">Stabil.</p>
          </div>

          <div class="glass rounded-2xl p-4 flex flex-col justify-between h-32">
            <div>
              <div class="text-white/50 text-[11px] font-bold uppercase tracking-wider flex items-center gap-1.5">
                <i class="fa-solid fa-eye text-[10px]"></i>Sichtweite
              </div>
              <p id="visibility" class="text-3xl font-light mt-1">--</p>
            </div>
            <p id="visibilityInfo" class="text-[11px] text-white/70 leading-tight">Klare Sicht.</p>
          </div>

          <div class="glass rounded-2xl p-4 flex flex-col justify-between h-32">
            <div>
              <div class="text-white/50 text-[11px] font-bold uppercase tracking-wider flex items-center gap-1.5">
                <i class="fa-solid fa-sun text-[10px]"></i>UV-Index
              </div>
              <p id="uvIndex" class="text-3xl font-light mt-1">--</p>
            </div>
            <p id="uvInfo" class="text-[11px] text-white/70 leading-tight">Kein Schutz nötig.</p>
          </div>

        </div>
      </div>
    </div>

    <div class="text-center text-white/40 text-sm mt-12 pb-6 tracking-wide font-medium">© ProfessorFilou</div>
  </div>

  <script>
    /* ─────────────── State ─────────────── */
    let map, marker, currentTileLayer;
    let currentMapTheme = 'dark';
    let currentLat = 48.137, currentLon = 11.575; // Standard auf München geändert
    let currentUnit = 'C';
    let currentData = null;

    let canvas, ctx;
    let particles = [];
    let cloudObjs = [];
    let weatherType = 'sunny';

    const weatherCodes = {
      0:  { desc: "Klarer Himmel",    type: "sunny",  icon: "☀️" },
      1:  { desc: "Überwiegend klar",    type: "sunny",  icon: "🌤️" },
      2:  { desc: "Teilweise bewölkt",     type: "cloudy", icon: "⛅" },
      3:  { desc: "Bewölkt",               type: "cloudy", icon: "☁️" },
      45: { desc: "Nebel",                 type: "cloudy", icon: "🌫️" },
      48: { desc: "Gefrierender Nebel",    type: "cloudy", icon: "🌫️" },
      51: { desc: "Leichter Nieselregen",  type: "rain",   icon: "🌦️" },
      53: { desc: "Nieselregen",           type: "rain",   icon: "🌧️" },
      55: { desc: "Starker Nieselregen",   type: "rain",   icon: "🌧️" },
      61: { desc: "Leichter Regen",        type: "rain",   icon: "🌧️" },
      63: { desc: "Regen",                 type: "rain",   icon: "🌧️" },
      65: { desc: "Starker Regen",         type: "rain",   icon: "🌧️" },
      71: { desc: "Leichter Schneefall",   type: "snow",   icon: "❄️" },
      73: { desc: "Schneefall",            type: "snow",   icon: "❄️" },
      75: { desc: "Starker Schneefall",    type: "snow",   icon: "❄️" },
      80: { desc: "Leichte Schauer",       type: "rain",   icon: "🌦️" },
      81: { desc: "Regenschauer",          type: "rain",   icon: "🌦️" },
      82: { desc: "Starke Schauer",        type: "rain",   icon: "⛈️" },
      95: { desc: "Gewitter",              type: "rain",   icon: "⛈️" },
      96: { desc: "Gewitter mit Hagel",    type: "rain",   icon: "⛈️" },
      99: { desc: "Schweres Gewitter",     type: "rain",   icon: "⛈️" },
    };

    function convertTemp(temp, toUnit) {
      return toUnit === 'F' ? Math.round((temp * 9/5) + 32) : Math.round(temp);
    }

    async function getCityName(lat, lon) {
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&zoom=10&accept-language=de`);
        const data = await res.json();
        if (data.address) {
          // Verbesserte Hierarchie: Sucht nach Stadt, Ort, Dorf, Stadtteil oder Gemeinde
          return data.address.city || 
                 data.address.town || 
                 data.address.village || 
                 data.address.suburb || 
                 data.address.municipality || 
                 data.address.hamlet || 
                 data.address.county || 
                 "Unbekannter Ort";
        }
        return "Unbekannter Ort";
      } catch (e) { return "Unbekannter Ort"; }
    }

    async function getWeather(lat, lon) {
      currentLat = lat; currentLon = lon;
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
        `&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,surface_pressure,visibility,uv_index,is_day` +
        `&hourly=temperature_2m,weather_code,precipitation_probability` +
        `&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max` +
        `&timezone=auto&forecast_days=8`;

      try {
        const res = await fetch(url);
        const data = await res.json();
        currentData = data;

        const city = await getCityName(lat, lon);
        document.getElementById("cityName").textContent = city;

        const code = data.current.weather_code;
        const w = weatherCodes[code] ?? { desc: "Unbekannt", type: "cloudy" };
        document.getElementById("weatherDesc").textContent = w.desc;

        const isDay = data.current.is_day === 1;
        const timeSuffix = isDay ? "-day" : "-night";
        
        document.body.className = "text-white min-h-screen antialiased theme-" + w.type + timeSuffix;

        updateDisplay(data);
        updateWeatherAnimation(code);
        updateMap(lat, lon);
        renderHourly(data.hourly, data.current.time);
        renderDaily(data.daily);
      } catch (err) { console.error(err); }
    }

    function updateDisplay(data) {
      document.getElementById("temperature").textContent = convertTemp(data.current.temperature_2m, currentUnit) + "°";
      document.getElementById("todayMax").textContent = convertTemp(data.daily.temperature_2m_max[0], currentUnit) + "°";
      document.getElementById("todayMin").textContent = convertTemp(data.daily.temperature_2m_min[0], currentUnit) + "°";
      document.getElementById("feelsLike").textContent  = convertTemp(data.current.apparent_temperature, currentUnit) + "°";
      document.getElementById("windSpeed").textContent  = Math.round(data.current.wind_speed_10m) + " km/h";
      
      document.getElementById("humidity").textContent   = data.current.relative_humidity_2m + "%";
      const dp = Math.round(data.current.temperature_2m - ((100 - data.current.relative_humidity_2m) / 5));
      document.getElementById("humidityInfo").textContent = `Der Taupunkt liegt bei ${dp}°${currentUnit}.`;

      document.getElementById("pressure").textContent   = Math.round(data.current.surface_pressure) + " hPa";
      document.getElementById("visibility").textContent = (data.current.visibility / 1000).toFixed(0) + " km";
      
      const uv = Math.round(data.current.uv_index || 0);
      document.getElementById("uvIndex").textContent = uv;
      document.getElementById("uvInfo").textContent = uv >= 6 ? "Schutz dringend nötig." : (uv >= 3 ? "Hut empfohlen." : "Kein Schutz nötig.");
    }

    function switchUnit() {
      currentUnit = currentUnit === 'C' ? 'F' : 'C';
      const toggle = document.getElementById("unitToggle");
      toggle.className = `unit-toggle flex items-center px-1 cursor-pointer ${currentUnit === 'C' ? 'celsius' : 'fahrenheit'}`;
      if (currentData) {
        updateDisplay(currentData);
        renderHourly(currentData.hourly, currentData.current.time);
        renderDaily(currentData.daily);
      }
    }

    /* ─────────────── Vollbild Canvas Engine ─────────────── */
    function initCanvas() {
      canvas = document.getElementById("globalWeatherCanvas");
      ctx    = canvas.getContext("2d");
      
      function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
        initClouds();
      }
      window.addEventListener("resize", resize);
      resize();
      animate();
    }

    function initClouds() {
      cloudObjs = [];
      let count = weatherType === 'cloudy' ? 12 : 5;
      for (let i = 0; i < count; i++) {
        cloudObjs.push({
          x: Math.random() * canvas.width,
          y: Math.random() * (canvas.height * 0.6),
          sizeX: Math.random() * 180 + 150,
          sizeY: Math.random() * 80 + 60,
          speed: Math.random() * 0.08 + 0.03
        });
      }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      if (weatherType === 'sunny') {
        let gradient = ctx.createRadialGradient(canvas.width * 0.75, canvas.height * 0.2, 10, canvas.width * 0.75, canvas.height * 0.2, 250);
        gradient.addColorStop(0, 'rgba(255, 255, 240, 0.15)');
        gradient.addColorStop(0.2, 'rgba(255, 240, 200, 0.05)');
        gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(canvas.width * 0.75, canvas.height * 0.2, 250, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.fillStyle = "rgba(255, 255, 255, 0.04)";
      cloudObjs.forEach(c => {
        ctx.beginPath();
        ctx.ellipse(c.x, c.y, c.sizeX, c.sizeY, 0, 0, Math.PI * 2);
        ctx.fill();
        c.x += c.speed;
        if (c.x > canvas.width + c.sizeX) c.x = -c.sizeX;
      });

      if (weatherType === 'rain' || weatherType === 'snow') {
        ctx.strokeStyle = weatherType === 'rain' ? "rgba(255, 255, 255, 0.15)" : "rgba(255, 255, 255, 0.35)";
        ctx.lineWidth = weatherType === 'rain' ? 1 : 2;
        
        particles.forEach(p => {
          ctx.beginPath();
          if (weatherType === 'rain') {
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(p.x + 1, p.y + p.len);
            ctx.stroke();
          } else {
            ctx.arc(p.x, p.y, p.len / 4, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(255, 255, 255, 0.35)";
            ctx.fill();
          }
          
          p.y += p.speed;
          if (p.y > canvas.height) {
            p.y = -20;
            p.x = Math.random() * canvas.width;
          }
        });
      }
      requestAnimationFrame(animate);
    }

    function updateWeatherAnimation(code) {
      weatherType = (weatherCodes[code] ?? { type: 'cloudy' }).type;
      particles = [];
      initClouds();
      
      if (weatherType === 'rain' || weatherType === 'snow') {
        let maxParticles = weatherType === 'rain' ? 60 : 40;
        for (let i = 0; i < maxParticles; i++) {
          particles.push({
            x: Math.random() * window.innerWidth,
            y: Math.random() * window.innerHeight,
            len: Math.random() * 12 + 10,
            speed: weatherType === 'rain' ? Math.random() * 2 + 3 : Math.random() * 0.5 + 0.8
          });
        }
      }
    }

    /* ─────────────── Map Setup ─────────────── */
    function updateMap(lat, lon) {
      if (!map) {
        map = L.map('map', { zoomControl: false }).setView([lat, lon], 9);
        currentTileLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        map.on('click', e => getWeather(e.latlng.lat, e.latlng.lng));
      } else { map.setView([lat, lon], map.getZoom()); }
      if (marker) marker.remove();
      marker = L.marker([lat, lon]).addTo(map);
    }

    function toggleMapTheme() {
      if (!map) return;
      const icon = document.getElementById("mapThemeIcon");
      map.removeLayer(currentTileLayer);
      
      if (currentMapTheme === 'dark') {
        currentTileLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
        currentMapTheme = 'light';
        icon.className = "fa-solid fa-moon text-indigo-200";
      } else {
        currentTileLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        currentMapTheme = 'dark';
        icon.className = "fa-solid fa-sun text-amber-400";
      }
    }

    /* ─────────────── Lists Generation ─────────────── */
    function renderHourly(hourly, currentTimeStr) {
      const cont = document.getElementById("hourlyForecast"); cont.innerHTML = "";
      const now = new Date(currentTimeStr); now.setMinutes(0, 0, 0);
      let startIdx = 0;
      for (let i = 0; i < hourly.time.length; i++) { if (new Date(hourly.time[i]) >= now) { startIdx = i; break; } }

      for (let i = startIdx; i < startIdx + 24; i++) {
        if (!hourly.time[i]) break;
        const hrs = new Date(hourly.time[i]).getHours().toString().padStart(2,'0');
        const pop = hourly.precipitation_probability[i];
        cont.innerHTML += `
          <div class="hourly-card flex flex-col items-center justify-between py-1">
            <p class="text-[13px] font-medium ${i === startIdx ? 'text-white' : 'text-white/60'}">${i === startIdx ? 'Jetzt' : hrs}</p>
            <div class="my-2 flex flex-col items-center">
              <span class="text-2xl">${(weatherCodes[hourly.weather_code[i]] ?? {icon:'⛅'}).icon}</span>
              <span class="text-[10px] font-bold text-sky-300 mt-0.5 h-3">${pop > 10 ? pop + '%' : ''}</span>
            </div>
            <p class="font-semibold text-sm">${convertTemp(hourly.temperature_2m[i], currentUnit)}°</p>
          </div>`;
      }
    }

    function renderDaily(daily) {
      const cont = document.getElementById("dailyForecast"); cont.innerHTML = "";
      const globalMin = Math.min(...daily.temperature_2m_min), globalMax = Math.max(...daily.temperature_2m_max), globalRange = globalMax - globalMin;

      for (let i = 0; i < 7; i++) {
        const day = new Date(daily.time[i]).toLocaleDateString('de-DE', { weekday: 'short' });
        const left = ((daily.temperature_2m_min[i] - globalMin) / globalRange) * 100;
        const width = ((daily.temperature_2m_max[i] - daily.temperature_2m_min[i]) / globalRange) * 100;
        const pop = daily.precipitation_probability_max[i];

        cont.innerHTML += `
          <div class="flex items-center justify-between text-sm py-1.5 border-b border-white/5 last:border-0">
            <div class="w-14 font-medium text-white/80">${i === 0 ? 'Heute' : day}</div>
            <div class="flex items-center gap-1 w-14 justify-center">
              <span class="text-xl">${(weatherCodes[daily.weather_code[i]] ?? {icon:'⛅'}).icon}</span>
              <span class="text-[9px] font-bold text-sky-300 min-w-[20px] text-left">${pop > 15 ? pop + '%' : ''}</span>
            </div>
            <div class="text-white/50 w-8 text-right font-medium">${convertTemp(daily.temperature_2m_min[i], currentUnit)}°</div>
            <div class="flex-1 mx-3"><div class="apple-bar-bg"><div class="apple-bar-fill" style="left: ${left}%; width: ${width}%;"></div>${i === 0 ? `<div class="apple-bar-dot" style="left: calc(${left}% + (${width}% / 2));"></div>` : ''}</div></div>
            <div class="text-white w-8 text-right font-medium">${convertTemp(daily.temperature_2m_max[i], currentUnit)}°</div>
          </div>`;
      }
    }

    /* ─────────────── Search & Geolocation ─────────────── */
    async function searchLocation(query) {
      const box = document.getElementById("suggestions");
      if (query.length < 2) { box.style.display = "none"; return; }
      try {
        const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=5&language=de&format=json`);
        const data = await res.json(); box.innerHTML = "";
        if (data.results?.length) {
          data.results.forEach(loc => {
            const div = document.createElement("div"); div.className = "suggestion-item text-sm text-white/90";
            div.textContent = `${loc.name}${loc.admin1 ? ', ' + loc.admin1 : ''}, ${loc.country || ''}`;
            div.onclick = () => { document.getElementById("searchInput").value = ""; box.style.display = "none"; getWeather(loc.latitude, loc.longitude); };
            box.appendChild(div);
          });
          box.style.display = "block";
        } else { box.style.display = "none"; }
      } catch(e) { box.style.display = "none"; }
    }

    document.getElementById("searchInput").addEventListener("input", e => searchLocation(e.target.value));
    document.addEventListener("click", e => { if (!e.target.closest("#searchInput") && !e.target.closest("#suggestions")) document.getElementById("suggestions").style.display = "none"; });

    function getCurrentLocation() {
      // Wenn erlaubt, nimm den Live-Standort, sonst standardmäßig München (48.137, 11.575)
      navigator.geolocation.getCurrentPosition(
        p => getWeather(p.coords.latitude, p.coords.longitude), 
        () => getWeather(48.137, 11.575) 
      );
    }

    window.onload = () => { initCanvas(); getCurrentLocation(); };
  </script>
</body>
</html>
